name: medicare
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0
  shared_preferences: ^2.3.2
http: ^1.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/medicare_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icon/medicare_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/medicare_icon.png
    - assets/sounds/notification.wav